<div class="container-fluid py-4 doctor-shell">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <div>
      <h4 class="mb-1 doctor-shell__title">{{ title }}</h4>
      <p class="text-muted mb-0">{{ subtitle }}</p>
    </div>
    <ng-content select="[shell-actions]"></ng-content>
  </div>

  <div class="row g-3 mb-3" *ngIf="metrics.length">
    <div class="col-sm-6 col-lg-3" *ngFor="let metric of metrics">
      <div class="card border-0 shadow-sm h-100 doctor-shell__metric-card">
        <div class="card-body">
          <p class="text-muted mb-1 text-uppercase fs-12">{{ metric.label }}</p>
          <h5 class="mb-0 fw-semibold">{{ metric.value }}</h5>
        </div>
      </div>
    </div>
  </div>

  <div class="doctor-shell__secondary-strip mb-3" *ngIf="secondaryMetrics.length">
    <div class="doctor-shell__secondary-item" *ngFor="let metric of secondaryMetrics">
      <h6 class="mb-0">{{ metric.value }}</h6>
      <p class="mb-0 text-muted">{{ metric.label }}</p>
    </div>
  </div>

  <ng-content></ng-content>
</div>
