<app-dashboard-shell
  [title]="'Billing'"
  [subtitle]="'Track invoices, payment status and cashflow.'"
  [metrics]="[
    { label: 'Month revenue', value: '$48,920' },
    { label: 'Pending', value: '$3,120' },
    { label: 'Paid invoices', value: '42' }
  ]"
  [secondaryMetrics]="[
    { label: 'Average invoice', value: '$108' },
    { label: 'Overdue invoices', value: '3' },
    { label: 'Collection rate', value: '91%' },
    { label: 'Refunds', value: '$420' }
  ]"
>
  <div class="card border-0 shadow-sm">
    <div class="card-body table-responsive">
      <table class="table align-middle mb-0">
        <thead><tr><th>Invoice</th><th>Patient</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          <tr *ngFor="let i of invoices">
            <td>{{ i.no }}</td>
            <td>{{ i.patient }}</td>
            <td>${{ i.amount }}</td>
            <td><app-status-badge [status]="i.status"></app-status-badge></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-dashboard-shell>
