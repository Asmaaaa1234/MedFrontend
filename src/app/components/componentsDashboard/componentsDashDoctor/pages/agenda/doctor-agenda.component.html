<app-dashboard-shell
  [title]="'Calendar'"
  [subtitle]="'Weekly planning with quick visibility on today slots.'"
  [metrics]="[
    { label: 'Slots today', value: '11' },
    { label: 'No-show risk', value: '2' },
    { label: 'Teleconsultations', value: '3' }
  ]"
  [secondaryMetrics]="[
    { label: 'Rooms active', value: '2' },
    { label: 'Average slot', value: '30m' },
    { label: 'Urgent inserts', value: '1' },
    { label: 'Reminders sent', value: '18' }
  ]"
>
  <div shell-actions>
    <button class="btn btn-primary">Sync agenda</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <label class="mb-0 d-flex align-items-center gap-2">
          <span class="text-muted">Date:</span>
          <input type="date" class="form-control" [(ngModel)]="selectedDate" />
        </label>
        <button class="btn btn-primary">Add appointment</button>
      </div>
      <div class="list-group">
        <div class="list-group-item" *ngFor="let slot of slots">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">{{ slot.time }} - {{ slot.patient }}</div>
              <small class="text-muted">{{ slot.room }}</small>
            </div>
            <app-status-badge [status]="'Scheduled'"></app-status-badge>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-dashboard-shell>
