<div id="layout-wrapper" (window:resize)="onResize($event)">
    <app-topbar-patient (mobileMenuButtonClicked)="onToggleMobileMenu()"></app-topbar-patient>
    <!-- Side Bar -->
    @if(issemiboxLayoutRequested()){
    <app-sidebar-doctor></app-sidebar-doctor>
    }
    @if(isTwoColumnLayoutRequested()){
    <app-two-column-sidebar-doctor></app-two-column-sidebar-doctor>
    }
    <app-sidebar-doctor id="side-bar" class="d-none"></app-sidebar-doctor>
    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid">
                <!-- Main Content -->
                <router-outlet></router-outlet>
            </div>
        </div>
        <!-- Footer -->
        <app-footer-doctor></app-footer-doctor>
    </div>
</div>
